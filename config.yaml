  # ── Parliamentary Committees ──────────────────────────────────────────────
  # Official API: https://committees-api.parliament.uk/index.html
  # IDs are discovered dynamically — search_name is matched against the API's committee list.
  # Committee IDs changed after the 2024 general election; dynamic lookup handles this.
  committees:
    - id: committee_sit_commons
      label: "Science, Innovation & Technology Committee (Commons)"
      type: parliament_committees_api
      search_name: "Science, Innovation and Technology"
      house: "Commons"

    - id: committee_st_lords
      label: "Science & Technology Committee (Lords)"
      type: parliament_committees_api
      search_name: "Science and Technology"
      house: "Lords"

    - id: committee_bt_commons
      label: "Business & Trade Committee (Commons)"
      type: parliament_committees_api
      search_name: "Business and Trade"
      house: "Commons"

    - id: committee_cd_lords
      label: "Communications & Digital Committee (Lords)"
      type: parliament_committees_api
      search_name: "Communications and Digital"
      house: "Lords"

    - id: committee_ea_lords
      label: "Economic Affairs Committee (Lords)"
      type: parliament_committees_api
      search_name: "Economic Affairs"
      house: "Lords"

    - id: committee_ir_lords
      label: "Industry & Regulators Committee (Lords)"
      type: parliament_committees_api
      search_name: "Industry and Regulators"
      house: "Lords"

    - id: committee_treasury_commons
      label: "Treasury Committee (Commons)"
      type: parliament_committees_api
      search_name: "Treasury"
      house: "Commons"

  # ── Committee Inquiries ───────────────────────────────────────────────────
  # committees.parliament.uk/inquiries — no API; HTML scrape.
  # FRAGILITY: medium — SSR page, layout may change.
  inquiries:
    - id: parliament_inquiries
      label: "Committee Inquiries (All)"
      type: parliament_inquiries_scrape
      url: "https://committees.parliament.uk/inquiries/"

  # ── Written Statements ────────────────────────────────────────────────────
  # Official API: https://questions-statements-api.parliament.uk/index.html
  # (Old domain oralquestionsandstatements.parliament.uk is defunct)
  written_statements:
    - id: written_statements_commons
      label: "Written Statements (Commons)"
      type: parliament_written_statements_api
      house: "Commons"

    - id: written_statements_lords
      label: "Written Statements (Lords)"
      type: parliament_written_statements_api
      house: "Lords"

  # ── Hansard ───────────────────────────────────────────────────────────────
  # Official API: https://hansard-api.parliament.uk/swagger/docs/v1
  hansard:
    - id: hansard_commons
      label: "Hansard (Commons)"
      type: hansard_api
      house: "Commons"

    - id: hansard_lords
      label: "Hansard (Lords)"
      type: hansard_api
      house: "Lords"

  # ── Bills ─────────────────────────────────────────────────────────────────
  # Official API: https://bills-api.parliament.uk/index.html
  bills:
    - id: bills_commons
      label: "Bills (Commons)"
      type: bills_api
      house: "Commons"

    - id: bills_lords
      label: "Bills (Lords)"
      type: bills_api
      house: "Lords"

  # ── Votes / Divisions ─────────────────────────────────────────────────────
  # Commons: https://commonsvotes-api.parliament.uk/swagger/docs/v1
  # Lords:   https://lordsvotes-api.parliament.uk
  votes:
    - id: votes_commons
      label: "Commons Divisions"
      type: commons_votes_api
      house: "Commons"

    - id: votes_lords
      label: "Lords Divisions"
      type: commons_votes_api
      house: "Lords"

  # ── Oral Questions ────────────────────────────────────────────────────────
  # Official API: https://oralquestionsandmotions-api.parliament.uk/swagger/ui/index
  oral_questions:
    - id: oraq_commons
      label: "Oral Questions (Commons)"
      type: oral_questions_api
      house: "Commons"

  # ── Live Now ──────────────────────────────────────────────────────────────
  # Official API: https://now-api.parliament.uk/index.html
  now:
    - id: now_commons
      label: "Commons — Live Now"
      type: now_parliament_api
      house: "Commons"

    - id: now_lords
      label: "Lords — Live Now"
      type: now_parliament_api
      house: "Lords"

  # ── What's On in Parliament ───────────────────────────────────────────────
  # Official API: https://whatson-api.parliament.uk/swagger/ui/index
  # Falls back to HTML scrape if the API returns no events.
  whatson:
    - id: whatson_parliament
      label: "What's On in Parliament"
      type: whatson_scrape
      url: "https://whatson.parliament.uk"
