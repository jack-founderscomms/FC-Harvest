# FC-Harvest configuration
# Edit sources, keywords and schedule here — no code changes needed.

schedule:
  # Cron expression: default 7am UK time (UTC+0 winter / UTC+1 summer — set UTC here, adjust for BST manually)
  cron: "0 7 * * *"
  timezone: "Europe/London"

keywords:
  - AI
  - artificial intelligence
  - technology
  - digital
  - data
  - regulation
  - semiconductor
  - semiconductor chips
  - cyber
  - cybersecurity
  - broadband
  - telecoms
  - innovation
  - R&D
  - research and development
  - fintech
  - open banking
  - competition
  - antitrust
  - platforms
  - online safety
  - GDPR
  - data protection
  - science
  - space
  - quantum
  - net zero
  - green tech
  - trade
  - export controls

sources:

  # ── GOV.UK Search API ─────────────────────────────────────────────────────
  # Uses https://www.gov.uk/api/search.json — official, no scraping.
  # Valid filter: filter_organisations, filter_document_type, order, count.
  # NOTE: filter_content_purpose_supergroup is NOT a valid API field — removed.
  # filter_document_type values: news_story, press_release, guidance, consultation,
  #   policy_paper, speech, written_statement, government_response, transparency
  govuk:
    - id: govuk_dsit
      label: "DSIT"
      type: govuk_api
      params:
        filter_organisations: "department-for-science-innovation-and-technology"
        filter_document_type:
          - news_story
          - press_release
          - guidance
          - consultation
          - policy_paper
          - speech
          - written_statement
          - government_response
        order: "-updated_at"
        count: 50

    - id: govuk_treasury
      label: "HM Treasury"
      type: govuk_api
      params:
        filter_organisations: "hm-treasury"
        filter_document_type:
          - news_story
          - press_release
          - guidance
          - consultation
          - policy_paper
          - speech
          - written_statement
          - government_response
        order: "-updated_at"
        count: 50

    - id: govuk_cabinet_office
      label: "Cabinet Office"
      type: govuk_api
      params:
        filter_organisations: "cabinet-office"
        filter_document_type:
          - news_story
          - press_release
          - guidance
          - consultation
          - policy_paper
          - speech
          - written_statement
          - government_response
        order: "-updated_at"
        count: 50

    - id: govuk_no10
      label: "No.10 / Prime Minister's Office"
      type: govuk_api
      params:
        filter_organisations: "prime-ministers-office-10-downing-street"
        filter_document_type:
          - news_story
          - press_release
          - speech
        order: "-updated_at"
        count: 50

    - id: govuk_dbt
      label: "DBT"
      type: govuk_api
      params:
        filter_organisations: "department-for-business-and-trade"
        filter_document_type:
          - news_story
          - press_release
          - guidance
          - consultation
          - policy_paper
          - speech
          - written_statement
          - government_response
        order: "-updated_at"
        count: 50

  # ── Parliamentary Committees ──────────────────────────────────────────────
  # committees.parliament.uk committee IDs changed after the 2024 general election.
  # We use dynamic discovery: the runner scrapes the committee listing page to find
  # current IDs, then builds RSS URLs. The static IDs below are used as fallback labels.
  # TYPE: parliament_committee_news — uses dynamic ID discovery (see fetcher).
  committees:
    - id: committee_sit_commons
      label: "Science, Innovation & Technology Committee (Commons)"
      type: parliament_committee_news
      search_name: "Science, Innovation and Technology"
      house: "Commons"

    - id: committee_st_lords
      label: "Science & Technology Committee (Lords)"
      type: parliament_committee_news
      search_name: "Science and Technology"
      house: "Lords"

    - id: committee_bt_commons
      label: "Business & Trade Committee (Commons)"
      type: parliament_committee_news
      search_name: "Business and Trade"
      house: "Commons"

    - id: committee_cd_lords
      label: "Communications & Digital Committee (Lords)"
      type: parliament_committee_news
      search_name: "Communications and Digital"
      house: "Lords"

    - id: committee_ea_lords
      label: "Economic Affairs Committee (Lords)"
      type: parliament_committee_news
      search_name: "Economic Affairs"
      house: "Lords"

    - id: committee_ir_lords
      label: "Industry & Regulators Committee (Lords)"
      type: parliament_committee_news
      search_name: "Industry and Regulators"
      house: "Lords"

    - id: committee_treasury_commons
      label: "Treasury Committee (Commons)"
      type: parliament_committee_news
      search_name: "Treasury"
      house: "Commons"

  # ── Committee Inquiries ───────────────────────────────────────────────────
  # committees.parliament.uk/inquiries has no stable RSS/API — HTML scrape.
  # FRAGILITY NOTE: SSR page, structure may change after website redesigns.
  inquiries:
    - id: parliament_inquiries
      label: "Committee Inquiries (All)"
      type: parliament_inquiries_scrape
      url: "https://committees.parliament.uk/inquiries/"

  # ── Written Statements ────────────────────────────────────────────────────
  # Official Parliament API. Domain changed from oralquestionsandstatements.parliament.uk
  # to questions-statements-api.parliament.uk.
  written_statements:
    - id: written_statements_commons
      label: "Written Statements (Commons)"
      type: parliament_written_statements_api
      house: "Commons"

    - id: written_statements_lords
      label: "Written Statements (Lords)"
      type: parliament_written_statements_api
      house: "Lords"

  # ── Hansard ───────────────────────────────────────────────────────────────
  # Uses the Hansard search API to fetch recent debates by house.
  # Falls back to RSS if the search endpoint changes.
  hansard:
    - id: hansard_commons
      label: "Hansard (Commons)"
      type: hansard_api
      house: "Commons"

    - id: hansard_lords
      label: "Hansard (Lords)"
      type: hansard_api
      house: "Lords"

  # ── What's On in Parliament ───────────────────────────────────────────────
  # whatson.parliament.uk — scrape (no reliable RSS URL found).
  whatson:
    - id: whatson_parliament
      label: "What's On in Parliament"
      type: whatson_scrape
      url: "https://whatson.parliament.uk"
