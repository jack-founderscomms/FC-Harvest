name: Harvest & Publish

on:
  schedule:
    # 7:05am UK time (UTC — BST is UTC+1 so this runs at 8:05am during summer)
    - cron: "5 7 * * 1-5"   # weekdays only
  workflow_dispatch:          # manual trigger from GitHub Actions UI

permissions:
  contents: write   # needed to commit docs/index.html back to the repo

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Persist the SQLite DB between runs so items accumulate
      - name: Restore harvest DB cache
        uses: actions/cache@v4
        with:
          path: harvest.db
          key: harvest-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: harvest-db-${{ github.ref_name }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run harvest
        run: python run.py harvest
        env:
          PYTHONUNBUFFERED: "1"

      - name: Generate static site
        run: python generate_static.py

      - name: Commit and push static site
        run: |
          git config user.name  "fc-harvest[bot]"
          git config user.email "fc-harvest[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to docs/index.html — skipping commit"
          else
            git commit -m "chore: update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin ${{ github.ref_name }}
          fi
