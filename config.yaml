# FC-Harvest configuration
# Edit sources, keywords and schedule here — no code changes needed.

schedule:
  cron: "0 7 * * *"
  timezone: "Europe/London"

keywords:
  - AI
  - artificial intelligence
  - technology
  - digital
  - data
  - regulation
  - semiconductor
  - semiconductor chips
  - cyber
  - cybersecurity
  - broadband
  - telecoms
  - innovation
  - R&D
  - research and development
  - fintech
  - open banking
  - competition
  - antitrust
  - platforms
  - online safety
  - GDPR
  - data protection
  - science
  - space
  - quantum
  - net zero
  - green tech
  - trade
  - export controls

sources:

  # ── GOV.UK Search API ─────────────────────────────────────────────────────
  # Docs: https://docs.publishing.service.gov.uk/repos/search-api/using-the-search-api.html
  # Valid filter: filter_organisations, filter_content_store_document_type, order, count
  # INVALID (causes 422): filter_content_purpose_supergroup, filter_document_type
  govuk:
    - id: govuk_dsit
      label: "DSIT"
      type: govuk_api
      params:
        filter_organisations: "department-for-science-innovation-and-technology"
        filter_content_store_document_type:
          - news_story
          - press_release
          - guidance
          - consultation
          - policy_paper
          - speech
          - written_statement
          - government_response
        order: "-public_timestamp"
        count: 50

    - id: govuk_treasury
      label: "HM Treasury"
      type: govuk_api
      params:
        filter_organisations: "hm-treasury"
        filter_content_store_document_type:
          - news_story
          - press_release
          - guidance
          - consultation
          - policy_paper
          - speech
          - written_statement
          - government_response
        order: "-public_timestamp"
        count: 50

    - id: govuk_cabinet_office
      label: "Cabinet Office"
      type: govuk_api
      params:
        filter_organisations: "cabinet-office"
        filter_content_store_document_type:
          - news_story
          - press_release
          - guidance
          - consultation
          - policy_paper
          - speech
          - written_statement
          - government_response
        order: "-public_timestamp"
        count: 50

    - id: govuk_no10
      label: "No.10 / Prime Minister's Office"
      type: govuk_api
      params:
        filter_organisations: "prime-ministers-office-10-downing-street"
        filter_content_store_document_type:
          - news_story
          - press_release
          - speech
        order: "-public_timestamp"
        count: 50

    - id: govuk_dbt
      label: "DBT"
      type: govuk_api
      params:
        filter_organisations: "department-for-business-and-trade"
        filter_content_store_document_type:
          - news_story
          - press_release
          - guidance
          - consultation
          - policy_paper
          - speech
          - written_statement
          - government_response
        order: "-public_timestamp"
        count: 50

  # ── Parliamentary Committees ──────────────────────────────────────────────
  # Official API: https://committees-api.parliament.uk/index.html
  # IDs are discovered dynamically — search_name is matched against the API's committee list.
  # Committee IDs changed after the 2024 general election; dynamic lookup handles this.
  committees:
    - id: committee_sit_commons
      label: "Science, Innovation & Technology Committee (Commons)"
      type: parliament_committees_api
      search_name: "Science, Innovation and Technology"
      house: "Commons"

    - id: committee_st_lords
      label: "Science & Technology Committee (Lords)"
      type: parliament_committees_api
      search_name: "Science and Technology"
      house: "Lords"

    - id: committee_bt_commons
      label: "Business & Trade Committee (Commons)"
      type: parliament_committees_api
      search_name: "Business and Trade"
      house: "Commons"

    - id: committee_cd_lords
      label: "Communications & Digital Committee (Lords)"
      type: parliament_committees_api
      search_name: "Communications and Digital"
      house: "Lords"

    - id: committee_ea_lords
      label: "Economic Affairs Committee (Lords)"
      type: parliament_committees_api
      search_name: "Economic Affairs"
      house: "Lords"

    - id: committee_ir_lords
      label: "Industry & Regulators Committee (Lords)"
      type: parliament_committees_api
      search_name: "Industry and Regulators"
      house: "Lords"

    - id: committee_treasury_commons
      label: "Treasury Committee (Commons)"
      type: parliament_committees_api
      search_name: "Treasury"
      house: "Commons"

  # ── Committee Inquiries ───────────────────────────────────────────────────
  # committees.parliament.uk/inquiries — no API; HTML scrape.
  # FRAGILITY: medium — SSR page, layout may change.
  inquiries:
    - id: parliament_inquiries
      label: "Committee Inquiries (All)"
      type: parliament_inquiries_scrape
      url: "https://committees.parliament.uk/inquiries/"

  # ── Written Statements ────────────────────────────────────────────────────
  # Official API: https://questions-statements-api.parliament.uk/index.html
  # (Old domain oralquestionsandstatements.parliament.uk is defunct)
  written_statements:
    - id: written_statements_commons
      label: "Written Statements (Commons)"
      type: parliament_written_statements_api
      house: "Commons"

    - id: written_statements_lords
      label: "Written Statements (Lords)"
      type: parliament_written_statements_api
      house: "Lords"

  # ── Hansard ───────────────────────────────────────────────────────────────
  # Official API: https://hansard-api.parliament.uk/swagger/docs/v1
  hansard:
    - id: hansard_commons
      label: "Hansard (Commons)"
      type: hansard_api
      house: "Commons"

    - id: hansard_lords
      label: "Hansard (Lords)"
      type: hansard_api
      house: "Lords"

  # ── What's On in Parliament ───────────────────────────────────────────────
  # Official API: https://whatson-api.parliament.uk/swagger/ui/index
  # Falls back to HTML scrape if the API returns no events.
  whatson:
    - id: whatson_parliament
      label: "What's On in Parliament"
      type: whatson_scrape
      url: "https://whatson.parliament.uk"
