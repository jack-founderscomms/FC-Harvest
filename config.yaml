  # ── GOV.UK Search API ─────────────────────────────────────────────────────
  # Docs: https://docs.publishing.service.gov.uk/repos/search-api/using-the-search-api.html
  # Valid filter: filter_organisations, filter_content_store_document_type, order, count
  # INVALID (causes 422): filter_content_purpose_supergroup, filter_document_type
  govuk:
    - id: govuk_dsit
      label: "DSIT"
      type: govuk_api
      params:
        filter_organisations: "department-for-science-innovation-and-technology"
        filter_content_store_document_type:
          - news_story
          - press_release
          - guidance
          - consultation
          - policy_paper
          - speech
          - written_statement
          - government_response
        order: "-public_timestamp"
        count: 50

    - id: govuk_treasury
      label: "HM Treasury"
      type: govuk_api
      params:
        filter_organisations: "hm-treasury"
        filter_content_store_document_type:
          - news_story
          - press_release
          - guidance
          - consultation
          - policy_paper
          - speech
          - written_statement
          - government_response
        order: "-public_timestamp"
        count: 50

    - id: govuk_cabinet_office
      label: "Cabinet Office"
      type: govuk_api
      params:
        filter_organisations: "cabinet-office"
        filter_content_store_document_type:
